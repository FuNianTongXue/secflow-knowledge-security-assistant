services:
  secflow-knowledge-security-assistant:
    build: .
    container_name: secflow-knowledge-security-assistant
    environment:
      SECFLOW_DATA_DIR: /app/data
      DATABASE_URL: postgresql://secflow:secflow@postgres:5432/secflow
      SECFLOW_LLM_PROVIDER: ${SECFLOW_LLM_PROVIDER:-deepseek}
      SECFLOW_LLM_ENDPOINT: ${SECFLOW_LLM_ENDPOINT:-https://api.deepseek.com/v1}
      SECFLOW_LLM_MODEL: ${SECFLOW_LLM_MODEL:-deepseek-chat}
      SECFLOW_LLM_API_KEY: ${SECFLOW_LLM_API_KEY:-}
    ports:
      - "18081:18081"
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: secflow-knowledge-postgres
    environment:
      POSTGRES_DB: secflow
      POSTGRES_USER: secflow
      POSTGRES_PASSWORD: secflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
